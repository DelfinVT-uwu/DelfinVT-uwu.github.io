<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DelfinVT — Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Teko:wght@400;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --c1: #00eeff;
  --c2: #cc00ff;
  --c3: #ff2d78;
  --c4: #ffe44d;
  --c5: #00ffaa;
  --dark: #06040f;
  --dark2: #0d0820;
  --grid-color: #ff2d7844;
  --grid-color2: #cc00ff33;
  --glow1: 0 0 12px #00eeff, 0 0 30px #00eeff55;
  --glow2: 0 0 12px #cc00ff, 0 0 30px #cc00ff55;
  --glow3: 0 0 12px #ff2d78, 0 0 30px #ff2d7855;
}

html { cursor: none; scroll-behavior: smooth; }
body {
  background: var(--dark);
  color: #dde0ff;
  font-family: 'Share Tech Mono', monospace;
  overflow-x: hidden;
}

/* CURSOR */
#cur { position:fixed; width:10px; height:10px; background:#fff; border-radius:50%;
  pointer-events:none; z-index:9999; transform:translate(-50%,-50%);
  box-shadow:0 0 8px #fff, 0 0 16px #aaf; }
.tr { position:fixed; pointer-events:none; z-index:9998; transform:translate(-50%,-50%);
  animation:tf .7s ease-out forwards; }
@keyframes tf { 0%{opacity:1;transform:translate(-50%,-50%) scale(1)} 100%{opacity:0;transform:translate(-50%,-50%) scale(0)} }

/* SCANLINES */
body::after { content:''; position:fixed; inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.06) 2px,rgba(0,0,0,.06) 4px);
  pointer-events:none; z-index:800; }

/* STARFIELD */
#sf { position:fixed; inset:0; z-index:0; pointer-events:none; }

/* WAVY BG */
.wavy-bg { position:fixed; inset:0; z-index:1; opacity:0.15; pointer-events:none; overflow:hidden; }
.wavy-bg svg { width:100%; height:100%; }
.wl { fill:none; stroke-width:1; animation: wwave 8s ease-in-out infinite; }
@keyframes wwave { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-18px)} }

/* FLOATING SHAPES */
.shapes-layer { position:fixed; inset:0; z-index:2; pointer-events:none; overflow:hidden; }
.shape { position:absolute; animation: floatshape var(--dur,8s) ease-in-out infinite; }
@keyframes floatshape {
  0%,100%{transform:translateY(0) rotate(var(--r0,0deg))}
  50%{transform:translateY(var(--dy,-30px)) rotate(var(--r1,180deg))}
}
.shape-cube { width:55px; height:55px; background:linear-gradient(135deg,#cc00ff66,#ff2d7833);
  border:1px solid #cc00ff88; box-shadow:0 0 18px #cc00ff44; --dur:9s; --dy:-40px; --r0:0deg; --r1:90deg; }
.shape-cube2 { width:36px; height:36px; background:linear-gradient(135deg,#00eeff33,#cc00ff22);
  border:1px solid #00eeff66; box-shadow:0 0 14px #00eeff33; --dur:7s; --dy:-25px; --r0:45deg; --r1:135deg; }
.shape-tri { width:0; height:0; border-left:26px solid transparent;
  border-right:26px solid transparent; border-bottom:46px solid #ff2d7855;
  filter:drop-shadow(0 0 10px #ff2d78); --dur:11s; --dy:-35px; --r0:0deg; --r1:60deg; }
.shape-ring { width:65px; height:65px; border-radius:50%; border:3px solid #cc00ff77;
  box-shadow:0 0 18px #cc00ff55; --dur:12s; --dy:-50px; --r0:0deg; --r1:360deg; }
.shape-ring2 { width:44px; height:44px; border-radius:50%; border:2px solid #00eeff66;
  box-shadow:0 0 12px #00eeff44; --dur:9s; --dy:-30px; --r0:30deg; --r1:330deg; }
.shape-diamond { width:36px; height:36px; background:linear-gradient(135deg,#00eeff44,#ffe44d33);
  border:1px solid #00eeff88; transform:rotate(45deg); box-shadow:0 0 14px #00eeff33;
  --dur:10s; --dy:-35px; --r0:45deg; --r1:225deg; }

/* SYNTHWAVE GRID */
.grid-floor { position:fixed; bottom:0; left:0; width:100%; height:42vh; z-index:3; pointer-events:none; overflow:hidden; }
.grid-floor::before {
  content:''; position:absolute; inset:0;
  background: repeating-linear-gradient(90deg,var(--grid-color) 0 1px,transparent 1px 8vw),
              repeating-linear-gradient(180deg,var(--grid-color2) 0 1px,transparent 1px 4vh);
  transform:perspective(350px) rotateX(55deg); transform-origin:50% 0%;
  animation:grid-move 4s linear infinite;
}
@keyframes grid-move { 0%{background-position:0 0} 100%{background-position:0 4vh} }
.grid-floor::after { content:''; position:absolute; bottom:0; left:0; width:100%; height:55%;
  background:linear-gradient(to top,var(--dark),transparent); }

/* MARQUEE */
.mbar { position:sticky; top:0; z-index:500; overflow:hidden; padding:5px 0;
  background:linear-gradient(90deg,#06040f,#0d0820,#06040f);
  border-bottom:1px solid var(--c1); box-shadow:0 0 20px #00eeff33; }
.minner { display:inline-block; white-space:nowrap; animation:marquee 24s linear infinite;
  font-family:'Orbitron',monospace; font-size:10px; letter-spacing:3px;
  color:var(--c1); text-shadow:var(--glow1); }
@keyframes marquee{0%{transform:translateX(100vw)}100%{transform:translateX(-100%)}}
.mbar-line { height:1px; background:linear-gradient(90deg,transparent,var(--c1)33,var(--c2)33,transparent); margin:3px 0; }

/* LAYOUT */
.pw { position:relative; z-index:10; max-width:980px; margin:0 auto; padding:0 24px 100px; }

/* NAV */
.topnav { display:flex; justify-content:space-between; align-items:center; padding:20px 0 10px; flex-wrap:wrap; gap:10px; }
.nav-brand { font-family:'Orbitron',sans-serif; font-weight:900; font-size:15px; color:var(--c1); text-shadow:var(--glow1); letter-spacing:4px; }
.nav-links { display:flex; gap:4px; flex-wrap:wrap; }
.nav-links a { font-family:'Share Tech Mono',monospace; font-size:11px; letter-spacing:2px;
  color:#8899cc; text-decoration:none; padding:5px 12px; border:1px solid #ffffff11; transition:all .15s; }
.nav-links a:hover { color:var(--c1); border-color:var(--c1); text-shadow:var(--glow1); background:#00eeff08; }

/* HERO */
.hero { padding:65px 0 70px; text-align:center; position:relative; }
.hero-eyebrow { font-family:'Orbitron',monospace; font-size:10px; letter-spacing:6px; color:var(--c3);
  text-shadow:var(--glow3); margin-bottom:18px; text-transform:uppercase; }
.hero-name { font-family:'Teko',sans-serif; font-weight:700; letter-spacing:4px;
  font-size:clamp(80px,14vw,140px); line-height:0.88;
  background:linear-gradient(180deg,#ffffff 0%,var(--c1) 40%,var(--c2) 85%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  filter:drop-shadow(0 0 28px #00eeff66) drop-shadow(0 0 55px #cc00ff44);
  text-transform:uppercase; }
.hero-title-row { display:flex; justify-content:center; align-items:center; gap:14px; flex-wrap:wrap; margin:18px 0 28px; }
.hero-tag { font-family:'Orbitron',monospace; font-size:9px; letter-spacing:3px; padding:5px 16px; border:1px solid; text-transform:uppercase; }
.ht-c { border-color:var(--c1); color:var(--c1); text-shadow:var(--glow1); }
.ht-p { border-color:var(--c2); color:var(--c2); text-shadow:var(--glow2); }
.ht-r { border-color:var(--c3); color:var(--c3); text-shadow:var(--glow3); }
.hero-sub { font-family:'Share Tech Mono',monospace; font-size:12px; color:#6677aa; letter-spacing:3px; }
.hero-sub span { color:var(--c4); }
.blink { animation:blink 1s step-end infinite; }
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* DIVIDERS */
.div-rainbow { height:2px; margin:38px 0;
  background:linear-gradient(90deg,#ff000000,var(--c3),var(--c2),var(--c1),var(--c5),var(--c4),#ff000000);
  animation:rbshift 3s linear infinite; background-size:200%; }
@keyframes rbshift{0%{background-position:0%}100%{background-position:200%}}
.div-line { height:1px; margin:28px 0; background:linear-gradient(90deg,transparent,#ffffff22,transparent); }

/* SECTION TITLES */
.stitle { font-family:'Orbitron',sans-serif; font-weight:700;
  font-size:clamp(12px,2.5vw,17px); letter-spacing:4px; text-transform:uppercase;
  margin-bottom:26px; display:flex; align-items:center; gap:16px; }
.stitle::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,currentColor,transparent); opacity:.3; }
.s1 { color:var(--c1); text-shadow:var(--glow1); }
.s2 { color:var(--c2); text-shadow:var(--glow2); }
.s3 { color:var(--c3); text-shadow:var(--glow3); }
.s4 { color:var(--c4); }
.s5 { color:var(--c5); text-shadow:0 0 10px #00ffaa88; }

/* ABOUT */
.about-grid { display:grid; grid-template-columns:1fr 1fr; gap:18px; }
@media(max-width:650px){.about-grid{grid-template-columns:1fr}}
.about-block { border:1px solid; padding:22px; position:relative; overflow:hidden; background:#ffffff04; }
.about-block.ab1 { border-color:var(--c1); box-shadow:inset 0 0 30px #00eeff07; }
.about-block.ab2 { border-color:var(--c2); box-shadow:inset 0 0 30px #cc00ff07; }
.about-block::before { content:''; position:absolute; top:0; left:0; width:100%; height:1px;
  background:linear-gradient(90deg,transparent,currentColor,transparent); animation:scanline 3.5s linear infinite; }
@keyframes scanline{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.about-block.ab1::before { color:var(--c1); }
.about-block.ab2::before { color:var(--c2); }
.ab-label { font-family:'Orbitron',monospace; font-size:8px; letter-spacing:4px; color:#445566; margin-bottom:12px; text-transform:uppercase; }
.ab-text { font-size:13px; line-height:1.9; color:#b0c0e0; }
.ab-text strong { color:var(--c1); }
.tier-row { display:flex; flex-wrap:wrap; gap:7px; margin-top:16px; }
.tier { font-family:'Orbitron',monospace; font-size:8px; letter-spacing:2px;
  padding:4px 12px; border:1px solid; text-transform:uppercase; position:relative; overflow:hidden; }
.tier::before { content:''; position:absolute; inset:0; opacity:0.1; background:currentColor; }
.t1{border-color:var(--c1);color:var(--c1)} .t2{border-color:var(--c2);color:var(--c2)}
.t3{border-color:var(--c3);color:var(--c3)} .t4{border-color:var(--c4);color:var(--c4)}
.t5{border-color:var(--c5);color:var(--c5)} .t-red{border-color:#ff4444;color:#ff4444}
.t-gold{border-color:#ffd700;color:#ffd700}

/* CARDS */
.cards { display:grid; grid-template-columns:1fr 1fr; gap:18px; }
@media(max-width:700px){.cards{grid-template-columns:1fr}}
.card { border:1px solid; position:relative; overflow:hidden; background:#050510; transition:transform .2s,box-shadow .3s; }
.card:hover { transform:translateY(-4px) scale(1.01); }
.card.cc{border-color:var(--c1)} .card.cc:hover{box-shadow:var(--glow1)}
.card.cp{border-color:var(--c2)} .card.cp:hover{box-shadow:var(--glow2)}
.card.cr{border-color:var(--c3)} .card.cr:hover{box-shadow:var(--glow3)}
.card.cg{border-color:var(--c5)} .card.cg:hover{box-shadow:0 0 18px #00ffaa88}
.card-top { padding:16px 20px 12px; border-bottom:1px solid #ffffff0a; }
.card-num { font-family:'Orbitron',monospace; font-size:8px; letter-spacing:3px; color:#333355; margin-bottom:6px; }
.card-name { font-family:'Teko',sans-serif; font-weight:600;
  font-size:clamp(22px,3vw,30px); letter-spacing:2px; text-transform:uppercase; line-height:1.1; }
.cn-c{color:var(--c1);text-shadow:var(--glow1)} .cn-p{color:var(--c2);text-shadow:var(--glow2)}
.cn-r{color:var(--c3);text-shadow:var(--glow3)} .cn-g{color:var(--c5);text-shadow:0 0 10px #00ffaa88}
.card-sub { font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:2px; color:#445566; margin-top:4px; text-transform:uppercase; }
.card-body { padding:16px 20px 20px; }
.card-desc { font-size:13px; line-height:1.8; color:#9aaabb; margin-bottom:14px; }
.card-list { list-style:none; }
.card-list li { font-size:12px; color:#7788aa; padding:3px 0 3px 16px; position:relative; line-height:1.6; }
.card-list li::before { content:'>'; position:absolute; left:0; color:var(--c1); }
.card-tags { display:flex; flex-wrap:wrap; gap:4px; margin-top:12px; }
.tag { font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:1px; padding:2px 9px; border:1px solid; }
.tg-c{border-color:#00eeff33;color:var(--c1)} .tg-p{border-color:#cc00ff33;color:var(--c2)}
.tg-r{border-color:#ff2d7833;color:var(--c3)} .tg-y{border-color:#ffe44d33;color:var(--c4)}
.tg-g{border-color:#00ffaa33;color:var(--c5)}
.status-live { display:inline-flex; align-items:center; gap:5px;
  font-family:'Orbitron',monospace; font-size:7px; letter-spacing:2px;
  border:1px solid var(--c5); color:var(--c5); padding:2px 10px; margin-top:5px; }
.status-live .dot { width:5px; height:5px; border-radius:50%; background:var(--c5); animation:pd 1s ease-in-out infinite; }
@keyframes pd{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.6)}}
.status-wip { display:inline-flex; align-items:center; gap:5px;
  font-family:'Orbitron',monospace; font-size:7px; letter-spacing:2px;
  border:1px solid var(--c4); color:var(--c4); padding:2px 10px; margin-top:5px; }

/* CYBER FULL CARD */
.card-full { border:1px solid var(--c3); background:#050510; position:relative; overflow:hidden; margin-bottom:18px; }
.card-full::before { content:''; position:absolute; inset:0;
  background:radial-gradient(ellipse at 20% 50%,#ff2d7806 0%,transparent 60%),
             radial-gradient(ellipse at 80% 50%,#cc00ff06 0%,transparent 60%); pointer-events:none; }
.cf-header { padding:20px 26px 14px; border-bottom:1px solid #ff2d7820;
  display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; }
.cf-title { font-family:'Teko',sans-serif; font-weight:700; font-size:34px; letter-spacing:4px;
  color:var(--c3); text-shadow:var(--glow3); text-transform:uppercase; }
.cf-body { padding:18px 26px 26px; }
.ops-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:12px; margin-bottom:20px; }
.op-item { border:1px solid #ffffff0d; padding:14px 15px; background:#ffffff03; position:relative; }
.op-item::before { content:''; position:absolute; left:0; top:0; bottom:0; width:2px; }
.oi-r::before{background:var(--c3);box-shadow:0 0 8px var(--c3)} .oi-p::before{background:var(--c2);box-shadow:0 0 8px var(--c2)}
.oi-c::before{background:var(--c1);box-shadow:0 0 8px var(--c1)} .oi-y::before{background:var(--c4)}
.oi-g::before{background:var(--c5);box-shadow:0 0 8px var(--c5)}
.op-name { font-family:'Orbitron',monospace; font-size:9px; letter-spacing:2px; text-transform:uppercase; margin-bottom:7px; }
.oi-r .op-name{color:var(--c3)} .oi-p .op-name{color:var(--c2)} .oi-c .op-name{color:var(--c1)}
.oi-y .op-name{color:var(--c4)} .oi-g .op-name{color:var(--c5)}
.op-desc { font-size:11px; line-height:1.7; color:#6677aa; }

/* TIER TABLE */
.tier-table { width:100%; border-collapse:collapse; margin-top:14px; }
.tier-table th { font-family:'Orbitron',monospace; font-size:8px; letter-spacing:2px; color:#445566;
  padding:8px 12px; text-align:left; border-bottom:1px solid #ffffff0f; text-transform:uppercase; }
.tier-table td { font-size:11px; color:#8899bb; padding:8px 12px; border-bottom:1px solid #ffffff06; vertical-align:top; }
.tier-table tr:hover td { background:#ffffff04; }
.tier-name { font-family:'Orbitron',monospace; font-size:9px; letter-spacing:2px; font-weight:700; }

/* LANGUAGES */
.lang-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(155px,1fr)); gap:11px; }
.lang-item { border:1px solid #ffffff0e; padding:16px; background:#ffffff03;
  position:relative; overflow:hidden; text-align:center; transition:all .2s; }
.lang-item:hover { border-color:var(--c1); box-shadow:var(--glow1); transform:translateY(-3px); }
.lang-item::after { content:''; position:absolute; bottom:0; left:0; width:100%; height:2px; }
.li1::after{background:linear-gradient(90deg,var(--c1),var(--c2))} .li2::after{background:linear-gradient(90deg,#ff6600,#ff9900)}
.li3::after{background:linear-gradient(90deg,var(--c5),var(--c1))} .li4::after{background:linear-gradient(90deg,#4488ff,#8866ff)}
.li5::after{background:linear-gradient(90deg,var(--c3),var(--c4))}
.lang-name { font-family:'Orbitron',monospace; font-weight:700; font-size:13px; letter-spacing:2px; margin-bottom:6px; text-transform:uppercase; }
.lang-use { font-size:10px; color:#5566aa; letter-spacing:1px; line-height:1.6; }

/* SKILLS */
.skills-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:9px; }
.skill-item { border:1px solid #ffffff0d; padding:11px 14px; background:#ffffff03; }
.skill-name { font-family:'Orbitron',monospace; font-size:8px; letter-spacing:2px; color:var(--c1); margin-bottom:8px; text-transform:uppercase; }
.skill-bar { height:3px; background:#ffffff0d; overflow:hidden; }
.skill-fill { height:100%; background:linear-gradient(90deg,var(--c1),var(--c2));
  transform:scaleX(0); transform-origin:left; animation:sfill 1.4s ease-out forwards; }
@keyframes sfill{to{transform:scaleX(1)}}

/* CRYPTO */
.crypto-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(215px,1fr)); gap:13px; }
.crypto-item { border:1px solid #cc00ff2a; padding:16px; background:#0a0018; position:relative; overflow:hidden; }
.crypto-item::before { content:''; position:absolute; top:-1px; left:20%; right:20%; height:1px;
  background:linear-gradient(90deg,transparent,var(--c2),transparent); }
.crypto-name { font-family:'Orbitron',monospace; font-size:9px; letter-spacing:3px; color:var(--c2);
  text-shadow:var(--glow2); margin-bottom:8px; text-transform:uppercase; }
.crypto-desc { font-size:11px; color:#6677aa; line-height:1.7; }

/* CONTACT */
.contact-section { text-align:center; padding:50px 0; }
.contact-title { font-family:'Teko',sans-serif; font-weight:700; font-size:clamp(40px,8vw,70px);
  letter-spacing:6px; text-transform:uppercase;
  background:linear-gradient(90deg,var(--c1),var(--c2),var(--c3));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  filter:drop-shadow(0 0 20px #00eeff55); margin-bottom:20px; }
.contact-links { display:flex; justify-content:center; flex-wrap:wrap; gap:11px; margin-top:14px; }
.cbtn { font-family:'Orbitron',monospace; font-size:9px; letter-spacing:3px;
  padding:10px 22px; border:1px solid; text-decoration:none; text-transform:uppercase;
  transition:all .2s; position:relative; overflow:hidden; }
.cbtn::before { content:''; position:absolute; inset:0; opacity:0; background:currentColor; transition:opacity .2s; }
.cbtn:hover::before { opacity:0.1; }
.cbtn:hover { transform:scale(1.04); }
.cb1{border-color:#9147ff;color:#9147ff} .cb1:hover{box-shadow:0 0 16px #9147ff88}
.cb2{border-color:var(--c1);color:var(--c1)} .cb2:hover{box-shadow:var(--glow1)}
.cb3{border-color:var(--c2);color:var(--c2)} .cb3:hover{box-shadow:var(--glow2)}
.cb4{border-color:#f0f0f0;color:#f0f0f0} .cb4:hover{box-shadow:0 0 16px #ffffff44}
.corner-deco { font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:3px;
  color:#222244; text-align:center; margin-top:8px; text-transform:uppercase; }
.star-dots { font-family:'Share Tech Mono',monospace; font-size:10px; color:#ffffff12;
  text-align:center; letter-spacing:6px; margin:10px 0; }

section { margin-bottom:55px; }
</style>
</head>
<body>

<div id="cur"></div>
<canvas id="sf"></canvas>

<div class="wavy-bg">
  <svg viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <path class="wl" stroke="#cc00ff" d="M0,200 C240,180 480,220 720,200 C960,180 1200,220 1440,200"/>
    <path class="wl" stroke="#cc00ff" style="animation-delay:.3s" d="M0,220 C240,200 480,240 720,220 C960,200 1200,240 1440,220"/>
    <path class="wl" stroke="#cc00ff" style="animation-delay:.6s" d="M0,240 C240,220 480,260 720,240 C960,220 1200,260 1440,240"/>
    <path class="wl" stroke="#00eeff" style="animation-delay:1s" d="M0,500 C360,480 720,520 1080,500 C1260,490 1380,510 1440,500"/>
    <path class="wl" stroke="#00eeff" style="animation-delay:1.3s" d="M0,520 C360,500 720,540 1080,520 C1260,510 1380,530 1440,520"/>
    <path class="wl" stroke="#ff2d78" style="animation-delay:2s" d="M0,700 C240,690 480,710 720,700 C960,690 1200,710 1440,700"/>
    <path class="wl" stroke="#ff2d78" style="animation-delay:2.3s" d="M0,720 C240,710 480,730 720,720 C960,710 1200,730 1440,720"/>
  </svg>
</div>

<div class="shapes-layer">
  <div class="shape shape-cube"    s
